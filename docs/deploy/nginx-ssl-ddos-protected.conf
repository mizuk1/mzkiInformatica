# 🚀 Arquivo Nginx com DDoS Protection (Rate Limiting)
# IMPORTANTE: Substitua YOURDOMAIN.com pela seu domínio real
# Copie para: mzki/mzkiInformatica/docs/deploy/nginx-ssl.conf

# ============================================
# RATE LIMITING ZONES (http block)
# ============================================

# Definir zonas de rate limiting
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ============================================
# UPSTREAM DJANGO
# ============================================

upstream django_app {
    server web:8000;
}

# ============================================
# HTTP → HTTPS REDIRECT
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS SERVER (MAIN)
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name mzki.com.br www.mzki.com.br;

    # ============================================
    # SSL CONFIGURATION
    # ============================================
    
    ssl_certificate /etc/letsencrypt/live/mzki.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mzki.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================
    # SECURITY HEADERS - Fundamental
    # ============================================
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================
    # RATE LIMITING - GLOBAL (DDoS Protection)
    # ============================================
    
    # Rate limit geral: 30 req/s por IP
    limit_req zone=general_limit burst=100 nodelay;
    
    # Connection limit: max 10 conexões simultâneas por IP
    limit_conn addr 10;

    # Para evitar DoS de requests grandes
    client_max_body_size 10M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s 5s;

    # ============================================
    # LOGGING
    # ============================================
    
    access_log /var/log/nginx/mzki_access.log combined;
    error_log /var/log/nginx/mzki_error.log warn;

    # ============================================
    # STATIC FILES (sem rate limit necessário)
    # ============================================
    
    location /static/ {
        alias /app/mzkiInformatica/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    location /media/ {
        alias /app/mzkiInformatica/media/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        limit_conn addr 5;
    }

    # ============================================
    # AUTHENTICATION ENDPOINTS (STRICT)
    # ============================================
    
    location /accounts/login/ {
        # 5 login attempts por minuto por IP
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn addr 3;
        
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    location /accounts/register/ {
        # 2 register attempts por minuto por IP
        limit_req zone=login_limit burst=2 nodelay;
        limit_conn addr 2;
        
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    location /admin/ {
        # Admin interface: strict rate limit
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn addr 5;
        
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # API ENDPOINTS (MODERATE)
    # ============================================

    location /api/ {
        # 10 req/s por IP para API
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 5;
        
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para API
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        
        # HTTP/1.1 with keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============================================
    # GENERAL ENDPOINTS (DEFAULT)
    # ============================================

    location / {
        limit_req zone=general_limit burst=50 nodelay;
        limit_conn addr 10;
        
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts gerais
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        
        # Keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # BLOCK COMMON ATTACKS
    # ============================================

    # Block SQL injection patterns
    location ~ "\.(sql|exec|select|union|from|where|drop|insert)"  {
        return 403;
    }

    # Block suspicious user agents
    if ($http_user_agent ~* (bot|crawler|spider|nikto|sqlmap|nmap|masscan)) {
        return 403;
    }

    # Block large request bodies
    if ($content_length > 10485760) {  # 10MB
        return 413;
    }

    # ============================================
    # MONITORING & HEALTH CHECK
    # ============================================

    location /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker Network
        deny all;
    }

    location /health/ {
        proxy_pass http://django_app;
        access_log off;
    }

    # ============================================
    # HANDLE ERRORS
    # ============================================

    error_page 429 @rate_limited;
    location @rate_limited {
        internal;
        return 429 "Too Many Requests";
        add_header Content-Type text/plain;
    }

    error_page 502 503 504 @error_page;
    location @error_page {
        internal;
        if ($request_method = POST) {
            return 502;
        }
        default_type text/html;
        return 200 "
            <!DOCTYPE html>
            <html>
            <head><title>Serviço Indisponível</title></head>
            <body>
                <h1>Serviço Indisponível</h1>
                <p>O servidor está temporariamente indisponível.</p>
                <p>Por favor, tente novamente em alguns minutos.</p>
            </body>
            </html>
        ";
    }
}

# ============================================
# CONFIGURAÇÃO RECOMENDADA
# ============================================
#
# Rate Limits Explicados:
# - general_limit (30r/s): Para acesso geral (páginas, navegação)
# - api_limit (10r/s): Para endpoints de API
# - login_limit (5r/m): Para login/registro (previne brute force)
# - burst: Permite picos maiores, mas penaliza IPs agressivos
# - nodelay: Não atrasa requisições, apenas descarta as que excedem
#
# Connection Limits:
# - limit_conn addr 10: Máximo 10 conexões simultâneas por IP
# - Impede que um atacante ocupe todas as conexões
#
# Timeouts:
# - client_body_timeout: Tempo máximo para upload
# - client_header_timeout: Tempo máximo para enviar headers
# - proxy_connect_timeout: Tempo máximo para conectar ao Django
# - proxy_read_timeout: Tempo máximo para receber resposta
#
# Resultado:
# Ataque DDoS típico teria:
# - 1000+ req/s → Cada IP vê 30 req/s aceitas
# - Fail2Ban detecta e bloqueia após 10 rate limits
# - IPs atacantes são banidos por 1 hora
# - Aplicação continua operacional
#
# ============================================
